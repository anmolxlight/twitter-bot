name: Scheduled URL Ping

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    
    steps:
      - name: Ping URL
        env:
          PING_URL: ${{ secrets.PING_URL }}
        run: |
          curl -X GET "$PING_URL" \
            -H "User-Agent: GitHub-Actions-Scheduled-Ping" \
            -w "\nHTTP Status: %{http_code}\n" \
            -o response.txt
          echo "Response received:"
          cat response.txt
      - name: Check Status
        run: |
          echo "Ping completed at $(date)"
